export default function App() {
  const [questionsList, setQuestionsList] = useState(INITIAL_QUESTIONS);
  const [currentTab, setCurrentTab] = useState('learn'); // 'learn' | 'review' | 'stats' | 'list'
  
  // ユーザーデータ（間違い履歴やブックマークを保持、LocalStorage対応）
  const [userStats, setUserStats] = useState(() => {
    const saved = localStorage.getItem('it_literacy_stats_v3_full_107_fields');
    if (saved) {
      try { return JSON.parse(saved); } catch (e) { console.error(e); }
    }
    return {
      wrongAttempts: {}, 
      correctAttempts: {}, 
      bookmarks: [], 
      totalSolved: 0,
      streak: 0,
      lastSolvedDate: null
    };
  });

  // 音声読み上げに関するステート
  const [speechEnabled, setSpeechEnabled] = useState(false); 
  const [isSpeaking, setIsSpeaking] = useState(false); 
  const speechUtteranceRef = useRef(null); 

  // 自作のiOSスタイルモーダル（クラッシュを完璧に回避）
  const [modal, setModal] = useState({
    isOpen: false,
    title: '',
    message: '',
    onConfirm: null,
    showCancel: false
  });

  // クイズプレイ中の状態
  const [quizActive, setQuizActive] = useState(false);
  const [quizMode, setQuizMode] = useState('all'); 
  const [quizQuestions, setQuizQuestions] = useState([]);
  const [currentQuizIndex, setCurrentQuizIndex] = useState(0);
  const [selectedOption, setSelectedOption] = useState(null);
  const [isAnswered, setIsAnswered] = useState(false);
  const [shakeActive, setShakeActive] = useState(false);
  const [correctAnswersCount, setCorrectAnswersCount] = useState(0);

  // リスト画面の検索・フィルタ
  const [searchQuery, setSearchQuery] = useState('');
  const [selectedCategory, setSelectedCategory] = useState('すべて');
  const [expandedExplanation, setExpandedExplanation] = useState(null);

  // データの自動保存
  useEffect(() => {
    localStorage.setItem('it_literacy_stats_v3_full_107_fields', JSON.stringify(userStats));
  }, [userStats]);

  // タブ切り替えやテスト終了時に読み上げを綺麗に停止する
  useEffect(() => {
    stopSpeaking();
  }, [currentTab, quizActive, currentQuizIndex]);

  // 自動読み上げ（クイズ進行に連動）
  useEffect(() => {
    if (quizActive && speechEnabled && quizQuestions[currentQuizIndex]) {
      speakCurrentQuestion();
    }
  }, [currentQuizIndex, quizActive, speechEnabled]);

  const categories = ['すべて', ...new Set(questionsList.map(q => q.category))];

  // モニタシンセ音（正解・不正解・ボタン押下）の生成（Web Audio API）
  const playSound = (type) => {
    try {
      const AudioContext = window.AudioContext || window.webkitAudioContext;
      if (!AudioContext) return;
      const ctx = new AudioContext();
      const now = ctx.currentTime;
      
      if (type === 'tap') {
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.type = 'sine';
        osc.frequency.setValueAtTime(600, now);
        gain.gain.setValueAtTime(0.05, now);
        gain.gain.exponentialRampToValueAtTime(0.001, now + 0.1);
        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.start();
        osc.stop(now + 0.1);
      } else if (type === 'correct') {
        [523.25, 659.25, 783.99].forEach((f, i) => {
          const osc = ctx.createOscillator();
          const gain = ctx.createGain();
          osc.type = 'sine';
          osc.frequency.setValueAtTime(f, now + i * 0.08);
          gain.gain.setValueAtTime(0.03, now + i * 0.08);
          gain.gain.exponentialRampToValueAtTime(0.001, now + i * 0.08 + 0.15);
          osc.connect(gain);
          gain.connect(ctx.destination);
          osc.start(now + i * 0.08);
          osc.stop(now + i * 0.08 + 0.15);
        });
      } else if (type === 'wrong') {
        const osc1 = ctx.createOscillator();
        const osc2 = ctx.createOscillator();
        const gain = ctx.createGain();
        osc1.type = 'sawtooth';
        osc2.type = 'sawtooth';
        osc1.frequency.setValueAtTime(130, now);
        osc2.frequency.setValueAtTime(132, now);
        gain.gain.setValueAtTime(0.05, now);
        gain.gain.exponentialRampToValueAtTime(0.001, now + 0.35);
        osc1.connect(gain);
        osc2.connect(gain);
        gain.connect(ctx.destination);
        osc1.start();
        osc2.start();
        osc1.stop(now + 0.35);
        osc2.stop(now + 0.35);
      }
    } catch (e) {
      console.warn("AudioContext init warning:", e);
    }
  };

  // 自作カスタムアラート
  const showAlert = (title, message) => {
    setModal({
      isOpen: true,
      title,
      message,
      onConfirm: () => setModal(prev => ({ ...prev, isOpen: false })),
      showCancel: false
    });
  };

  // 自作カスタム確認ウィンドウ
  const showConfirm = (title, message, onConfirmCallback) => {
    setModal({
      isOpen: true,
      title,
      message,
      onConfirm: () => {
        onConfirmCallback();
        setModal(prev => ({ ...prev, isOpen: false }));
      },
      showCancel: true
    });
  };

  // 音声の読み上げ実行
  const speakText = (text) => {
    if (!('speechSynthesis' in window)) {
      showAlert("お知らせ", "お使いのブラウザや端末環境は音声読み上げに対応していません。");
      return;
    }

    try {
      window.speechSynthesis.cancel();
      if (!text) return;

      const utterance = new SpeechSynthesisUtterance(text);
      utterance.lang = 'ja-JP'; 
      utterance.rate = 1.05; 
      utterance.pitch = 1.0; 

      utterance.onstart = () => setIsSpeaking(true);
      utterance.onend = () => setIsSpeaking(false);
      utterance.onerror = () => setIsSpeaking(false);

      speechUtteranceRef.current = utterance;
      window.speechSynthesis.speak(utterance);
    } catch (error) {
      console.error("Speech error:", error);
      setIsSpeaking(false);
    }
  };

  const stopSpeaking = () => {
    try {
      if ('speechSynthesis' in window) {
        window.speechSynthesis.cancel();
      }
    } catch (e) {
      console.error(e);
    }
    setIsSpeaking(false);
  };

  const speakCurrentQuestion = () => {
    const q = quizQuestions[currentQuizIndex];
    if (!q) return;

    let textToSpeak = `カテゴリー、${q.category}。問題、${q.question}`;
    q.options.forEach((opt, index) => {
      textToSpeak += `。${index + 1}番、${opt}`;
    });
    // 数式の読み上げを少々聞きやすく調整
    textToSpeak = textToSpeak.replace(/∫/g, 'インテグラル').replace(/²/g, 'の2乗').replace(/√x/g, 'ルートエックス');
    speakText(textToSpeak);
  };

  const speakExplanation = () => {
    const q = quizQuestions[currentQuizIndex];
    if (!q) return;
    const isCorrect = selectedOption === q.answer;
    
    let textToSpeak = isCorrect 
      ? `正解です。正解の選択肢は${q.answer + 1}番、${q.options[q.answer]}です。` 
      : `不正解です。正解は${q.answer + 1}番、${q.options[q.answer]}です。`;
    
    textToSpeak += ` 解説、${q.explanation}`;
    textToSpeak = textToSpeak.replace(/∫/g, 'インテグラル').replace(/²/g, 'の2乗').replace(/√x/g, 'ルートエックス');
    speakText(textToSpeak);
  };

  const toggleBookmark = (questionId) => {
    playSound('tap');
    setUserStats(prev => {
      const isBookmarked = prev.bookmarks.includes(questionId);
      const newBookmarks = isBookmarked 
        ? prev.bookmarks.filter(id => id !== questionId)
        : [...prev.bookmarks, questionId];
      return { ...prev, bookmarks: newBookmarks };
    });
  };

  const startQuiz = (mode, targetCategory = '') => {
    playSound('tap');
    let selectedQs = [];
    if (mode === 'all') {
      selectedQs = [...questionsList];
    } else if (mode === 'random') {
      selectedQs = [...questionsList].sort(() => 0.5 - Math.random()).slice(0, 10);
    } else if (mode === 'weak') {
      const weakIds = Object.keys(userStats.wrongAttempts).filter(id => userStats.wrongAttempts[id] > 0);
      selectedQs = questionsList.filter(q => weakIds.includes(q.id));
      if (selectedQs.length === 0) {
        selectedQs = [...questionsList].sort(() => 0.5 - Math.random()).slice(0, 5);
      }
    } else if (mode === 'category') {
      selectedQs = questionsList.filter(q => q.category === targetCategory);
    }

    setQuizQuestions(selectedQs);
    setCurrentQuizIndex(0);
    setSelectedOption(null);
    setIsAnswered(false);
    setCorrectAnswersCount(0);
    setQuizMode(mode === 'category' ? `分野: ${targetCategory}` : mode);
    setQuizActive(true);
  };

  const handleCheckAnswer = () => {
    if (selectedOption === null || isAnswered) return;

    const currentQuestion = quizQuestions[currentQuizIndex];
    const isCorrect = selectedOption === currentQuestion.answer;

    setIsAnswered(true);

    if (isCorrect) {
      playSound('correct');
      setCorrectAnswersCount(prev => prev + 1);
    } else {
      playSound('wrong');
      setShakeActive(true);
      setTimeout(() => setShakeActive(false), 500);
    }

    setUserStats(prev => {
      const wrong = { ...prev.wrongAttempts };
      const correct = { ...prev.correctAttempts };
      
      if (isCorrect) {
        correct[currentQuestion.id] = (correct[currentQuestion.id] || 0) + 1;
      } else {
        wrong[currentQuestion.id] = (wrong[currentQuestion.id] || 0) + 1;
      }

      const today = new Date().toDateString();
      let newStreak = prev.streak;
      if (prev.lastSolvedDate !== today) {
        if (prev.lastSolvedDate === new Date(Date.now() - 86400000).toDateString()) {
          newStreak += 1;
        } else {
          newStreak = 1;
        }
      }

      return {
        ...prev,
        wrongAttempts: wrong,
        correctAttempts: correct,
        totalSolved: prev.totalSolved + 1,
        streak: newStreak,
        lastSolvedDate: today
      };
    });

    if (speechEnabled) {
      setTimeout(() => {
        speakExplanation();
      }, 700);
    }
  };

  const handleNextQuestion = () => {
    playSound('tap');
    if (currentQuizIndex < quizQuestions.length - 1) {
      setCurrentQuizIndex(prev => prev + 1);
      setSelectedOption(null);
      setIsAnswered(false);
    } else {
      setIsAnswered(true);
    }
  };

  const totalQuestionsInQuiz = quizQuestions.length;

  const weakQuestions = [...questionsList]
    .filter(q => (userStats.wrongAttempts[q.id] || 0) > 0)
    .sort((a, b) => (userStats.wrongAttempts[b.id] || 0) - (userStats.wrongAttempts[a.id] || 0))
    .slice(0, 5); // 苦手問題の上位5問を表示

  // カテゴリーごとの合計問題数を算出
  const getCategoryCounts = () => {
    const counts = {};
    questionsList.forEach(q => {
      counts[q.category] = (counts[q.category] || 0) + 1;
    });
    return counts;
  };
  const categoryCounts = getCategoryCounts();

  return (
    <div className="min-h-screen bg-slate-955 text-slate-100 font-sans flex flex-col justify-between max-w-md mx-auto relative overflow-hidden shadow-2xl border-x border-slate-900">
      {/* 背景のグローエフェクト */}
      <div className="absolute top-[-10%] left-[-20%] w-[80vw] h-[80vw] rounded-full bg-blue-500/10 blur-[120px] pointer-events-none" />
      <div className="absolute bottom-[-10%] right-[-20%] w-[80vw] h-[80vw] rounded-full bg-indigo-500/10 blur-[120px] pointer-events-none" />

      {/* アプリケーション ヘッダー */}
      <header className="sticky top-0 z-30 bg-slate-950/90 backdrop-blur-md px-4 py-3.5 border-b border-slate-900 flex items-center justify-between">
        <div className="flex items-center gap-2.5">
          <div className="bg-gradient-to-tr from-blue-600 to-indigo-500 p-2 rounded-xl shadow-lg shadow-blue-500/20">
            <BookOpen className="w-4 h-4 text-white" />
          </div>
          <div>
            <h1 className="text-[13.5px] font-bold tracking-tight bg-gradient-to-r from-blue-400 to-indigo-300 bg-clip-text text-transparent">
              ITリテラシー完璧模試
            </h1>
            <p className="text-[9px] text-slate-400 font-medium">大学試験対応・極上音声学習</p>
          </div>
        </div>
        
        {/* 音声トグル ＆ 継続日数バッジ */}
        <div className="flex items-center gap-2">
          <button 
            onClick={() => {
              playSound('tap');
              const nextState = !speechEnabled;
              setSpeechEnabled(nextState);
              if (!nextState) {
                stopSpeaking();
              } else {
                speakText("音声読み上げを有効にしました。");
              }
            }}
            className={`p-2 rounded-xl border transition-all duration-200 ${
              speechEnabled 
                ? 'bg-blue-500/20 text-blue-400 border-blue-500/30 ring-2 ring-blue-500/10' 
                : 'bg-slate-900 text-slate-500 border-slate-800'
            }`}
            title="音声読み上げの切り替え"
          >
            {speechEnabled ? <Volume2 className="w-4 h-4" /> : <VolumeX className="w-4 h-4" />}
          </button>

          <div className="flex items-center gap-1 bg-slate-900 px-2 py-1.5 rounded-xl border border-slate-800">
            <Sparkles className="w-3 h-3 text-amber-400" />
            <span className="text-[10px] font-bold text-amber-200">{userStats.streak || 0}日</span>
          </div>
        </div>
      </header>

      {/* メインビュー */}
      <main className="flex-1 overflow-y-auto px-4 py-4 z-10 pb-24">
        {quizActive ? (
          /* ======================================================== */
          /* クイズ進行画面 */
          /* ======================================================== */
          <div className="space-y-4 animate-fadeIn">
            <div className="flex items-center justify-between text-xs text-slate-400 px-1">
              <span className="bg-slate-900 px-2.5 py-1 rounded-lg border border-slate-800 text-[9.5px] font-semibold max-w-[180px] truncate">

                  return (
                    <div className="bg-slate-900 border border-slate-800 rounded-xl p-4.5 space-y-4">
                      <div className="flex items-center justify-between">
                        <span className="text-[11px] font-bold text-slate-300">
                          累計の正答確率
                        </span>
                        <span className="font-mono text-xs font-bold text-emerald-400">
                          {correctRate}%
                        </span>
                      </div>
                      
                      <div className="w-full bg-slate-950 h-2.5 rounded-full overflow-hidden border border-slate-800/40">
                        <div 
                          className="bg-gradient-to-r from-emerald-500 to-teal-400 h-full transition-all duration-300"
                          style={{ width: `${correctRate}%` }}
                        />
                      </div>

                      <div className="grid grid-cols-2 pt-2 border-t border-slate-850 text-[10px] text-slate-500">
                        <div>
                          正解総回数: <span className="font-mono text-emerald-400 font-bold">{totalCorrects}回</span>
                        </div>
                        <div className="text-right">
                          誤答総回数: <span className="font-mono text-rose-400 font-bold">{totalWrongs}回</span>
                        </div>
                      </div>
                    </div>
                  );
                })()}

                <div className="bg-slate-900/60 border border-slate-800 rounded-xl p-4.5 space-y-3.5">
                  <h3 className="text-xs font-bold text-slate-300">
                    カテゴリー別の解答率
                  </h3>

                  <div className="space-y-3">
                    {Object.keys(categoryCounts).map(cat => {
                      const catQs = questionsList.filter(q => q.category === cat);
                      let catWrongs = 0;
                      let catCorrects = 0;
                      catQs.forEach(q => {
                        catWrongs += userStats.wrongAttempts[q.id] || 0;
                        catCorrects += userStats.correctAttempts[q.id] || 0;
                      });
                      
                      const totalCat = catWrongs + catCorrects;
                      const accuracy = totalCat > 0 ? Math.round((catCorrects / totalCat) * 100) : 0;

                      return (
                        <div key={cat} className="space-y-1">
                          <div className="flex items-center justify-between text-[11px]">
                            <span className="text-slate-300 font-medium">{cat}</span>
                            <span className="text-slate-500 font-mono text-[10px]">
                              {totalCat > 0 ? `${accuracy}% (${totalCat}回解答)` : '未解答'}
                            </span>
                          </div>
                          <div className="w-full bg-slate-950 h-1.5 rounded-full overflow-hidden">
                            <div 
                              className={`h-full ${accuracy >= 80 ? 'bg-emerald-500' : accuracy >= 50 ? 'bg-amber-500' : 'bg-slate-800'}`}
                              style={{ width: totalCat > 0 ? `${accuracy}%` : '0%' }}
                            />
                          </div>
                        </div>
                      );
                    })}
                  </div>
                </div>
              </div>
            )}

            {currentTab === 'list' && (
              /* -------------------------------------------------- */
              /* 4. 問題一覧（暗記シート） */
              /* -------------------------------------------------- */
              <div className="space-y-4 animate-fadeIn">
                <div className="space-y-1">
                  <h2 className="text-sm font-bold text-slate-100">暗記用問題カード図鑑</h2>
                  <p className="text-[11px] text-slate-400 font-medium">各カードの「音読」ボタンで、1問1答の音声聞き流し暗記もできます。</p>
                </div>

                <div className="space-y-2">
                  <div className="relative">
                    <Search className="w-3.5 h-3.5 text-slate-500 absolute left-3 top-3.5" />
                    <input 
                      type="text" 
                      placeholder="キーワードや疑問を検索..."
                      value={searchQuery}
                      onChange={(e) => setSearchQuery(e.target.value)}
                      className="w-full bg-slate-900 border border-slate-800 rounded-xl py-2 pl-9 pr-4 text-xs text-slate-200 placeholder-slate-500 focus:outline-none focus:border-blue-500"
                    />
                  </div>

                  <div className="flex items-center gap-1.5 overflow-x-auto pb-1 scrollbar-none">
                    {categories.map((cat) => (
                      <button
                        key={cat}
                        onClick={() => { playSound('tap'); setSelectedCategory(cat); }}
                        className={`text-[10px] font-bold px-3 py-1.5 rounded-full border transition-all whitespace-nowrap shrink-0 ${
                          selectedCategory === cat
                            ? 'bg-blue-600 text-white border-blue-500 shadow-lg shadow-blue-500/10'
                            : 'bg-slate-900 text-slate-400 border-slate-800 hover:bg-slate-800'
                        }`}
                      >
                        {cat}
                      </button>
                    ))}
                  </div>
                </div>

                <div className="space-y-2.5">
                  {questionsList
                    .filter(q => selectedCategory === 'すべて' || q.category === selectedCategory)
                    .filter(q => searchQuery === '' || q.question.toLowerCase().includes(searchQuery.toLowerCase()))
                    .map((q, qIdx) => {
                      const isExpanded = expandedExplanation === q.id;
                      const isBookmarked = userStats.bookmarks.includes(q.id);

                      return (
                        <div key={q.id} className="bg-slate-900 border border-slate-800 rounded-xl transition-all">
                          <div className="p-3.5 flex items-start gap-3">
                            <span className="w-5 h-5 bg-slate-850 border border-slate-800 text-slate-400 rounded-lg flex items-center justify-center font-bold text-[10px] shrink-0 mt-0.5">
                              {qIdx + 1}
                            </span>
                            <div className="flex-1 space-y-1">
                              <div className="flex items-center gap-2">
                                <span className="text-[9px] bg-slate-955 text-slate-400 font-bold px-2 py-0.5 rounded border border-slate-800">
                                  {q.category}
                                </span>
                                
                                <button
                                  onClick={() => {
                                    playSound('tap');
                                    speakText(`問題、${q.question}。正しい答えは、${q.options[q.answer]}`);
                                  }}
                                  className="text-[8.5px] text-slate-400 hover:text-blue-400 flex items-center gap-1 bg-slate-950 px-2 py-0.5 rounded border border-slate-800"
                                >
                                  <Volume2 className="w-2.5 h-2.5 text-blue-400" />
                                  <span>音読</span>
                                </button>
                              </div>
                              <p className="text-[12px] font-semibold text-slate-200 leading-normal whitespace-pre-line">
                                {q.question}
                              </p>
                            </div>
                            <button 
                              onClick={() => toggleBookmark(q.id)}
                              className="p-1 text-slate-500 hover:text-amber-400 transition-colors"
                            >
                              <Bookmark className={`w-4 h-4 ${isBookmarked ? 'fill-amber-400 text-amber-400' : ''}`} />
                            </button>
                          </div>

                          <div className="border-t border-slate-800">
                            <button
                              onClick={() => { playSound('tap'); setExpandedExplanation(isExpanded ? null : q.id); }}
                              className="w-full px-3.5 py-2 flex items-center justify-between text-[10px] text-blue-400 hover:text-blue-300 font-bold transition-colors"
                            >
                              <span>{isExpanded ? '解答・解説を閉じる' : '解答と詳細な解説を表示'}</span>
                              <ChevronDown className={`w-3.5 h-3.5 transition-transform duration-200 ${isExpanded ? 'rotate-180' : ''}`} />
                            </button>

                            {isExpanded && (
                              <div className="px-3.5 pb-3.5 space-y-2.5 text-[11px] text-slate-300 border-t border-slate-800 pt-2.5 bg-slate-955/40 animate-fadeIn">
                                <div className="space-y-1 bg-slate-950/80 p-2.5 rounded-lg border border-slate-850">
                                  <div className="text-[9px] text-slate-500 font-bold uppercase tracking-wider flex items-center justify-between">
                                    <span>正しい解答</span>
                                    <button 
                                      onClick={() => speakText(`正解の解説。${q.explanation}`)}
                                      className="text-[8px] bg-slate-900 text-slate-300 px-1.5 py-0.5 rounded border border-slate-800 flex items-center gap-1 hover:text-blue-400"
                                    >
                                      <Volume2 className="w-2.5 h-2.5 text-blue-400" />
                                      解説を再生
                                    </button>
                                  </div>
                                  <div className="font-bold text-emerald-400 text-[11.5px] flex items-center gap-1.5">
                                    <CheckCircle2 className="w-3.5 h-3.5 text-emerald-400" />
                                    <span>{q.options[q.answer]}</span>
                                  </div>
                                </div>
                                <div className="space-y-1">
                                  <div className="text-[9px] text-slate-500 font-bold uppercase tracking-wider">
                                    解説詳細
                                  </div>
                                  <p className="leading-relaxed text-slate-400 whitespace-pre-wrap text-[10.5px]">
                                    {q.explanation}
                                  </p>
                                </div>
                              </div>
                            )}
                          </div>
                        </div>
                      );
                    })}
                </div>
              </div>
            )}
          </div>
        )}
      </main>

      {/* ボトムナビゲーション */}
      {!quizActive && (
        <nav className="fixed bottom-0 left-0 right-0 max-w-md mx-auto bg-slate-955/90 backdrop-blur-md border-t border-slate-900 px-3 py-2.5 flex justify-around items-center z-30">
          <button
            onClick={() => { playSound('tap'); setCurrentTab('learn'); }}
            className={`flex flex-col items-center gap-1 py-1 px-3 rounded-xl transition-all ${
              currentTab === 'learn' ? 'text-blue-400 font-bold' : 'text-slate-500 hover:text-slate-300'
            }`}
          >
            <BookOpen className="w-4.5 h-4.5" />
            <span className="text-[9px]">学習する</span>
          </button>

          <button
            onClick={() => { playSound('tap'); setCurrentTab('review'); }}
            className={`flex flex-col items-center gap-1 py-1 px-3 rounded-xl transition-all relative ${
              currentTab === 'review' ? 'text-rose-400 font-bold' : 'text-slate-500 hover:text-slate-300'
            }`}
          >
            <RotateCcw className="w-4.5 h-4.5" />
            <span className="text-[9px]">復習する</span>
            {Object.keys(userStats.wrongAttempts).filter(id => userStats.wrongAttempts[id] > 0).length > 0 && (
              <span className="absolute top-1 right-3.5 w-1.5 h-1.5 bg-rose-500 rounded-full animate-pulse" />
            )}
          </button>

          <button
            onClick={() => { playSound('tap'); setCurrentTab('stats'); }}
            className={`flex flex-col items-center gap-1 py-1 px-3 rounded-xl transition-all ${
              currentTab === 'stats' ? 'text-emerald-400 font-bold' : 'text-slate-500 hover:text-slate-300'
            }`}
          >
            <BarChart2 className="w-4.5 h-4.5" />
            <span className="text-[9px]">分析データ</span>
          </button>

          <button
            onClick={() => { playSound('tap'); setCurrentTab('list'); }}
            className={`flex flex-col items-center gap-1 py-1 px-3 rounded-xl transition-all ${
              currentTab === 'list' ? 'text-indigo-400 font-bold' : 'text-slate-500 hover:text-slate-300'
            }`}
          >
            <List className="w-4.5 h-4.5" />
            <span className="text-[9px]">問題一覧</span>
          </button>
        </nav>
      )}

      {/* iOSスタイルモーダルUI */}
      {modal.isOpen && (
        <div className="fixed inset-0 z-50 flex items-center justify-center p-6 bg-slate-950/80 backdrop-blur-sm animate-fadeIn">
          <div className="bg-slate-900 border border-slate-800 rounded-2xl max-w-[280px] w-full overflow-hidden shadow-2xl p-5 space-y-4">
            <div className="space-y-1.5 text-center">
              <h3 className="text-sm font-bold text-slate-100">{modal.title}</h3>
              <p className="text-xs text-slate-400 leading-normal">{modal.message}</p>
            </div>
            <div className="flex gap-2 pt-2">
              {modal.showCancel && (
                <button
                  onClick={() => { playSound('tap'); setModal(prev => ({ ...prev, isOpen: false })); }}
                  className="flex-1 py-2.5 rounded-xl border border-slate-800 hover:bg-slate-800 text-[11px] font-bold text-slate-400 transition-colors"
                >
                  キャンセル
                </button>
              )}
              <button
                onClick={() => { playSound('tap'); modal.onConfirm(); }}
                className="flex-1 py-2.5 rounded-xl bg-blue-600 hover:bg-blue-500 text-[11px] font-bold text-white transition-colors"
              >
                OK
              </button>
            </div>
          </div>
        </div>
      )}

      {/* スタイル定義 */}
      <style>{`
        @keyframes shake {
          0%, 100% { transform: translateX(0); }
          20%, 60% { transform: translateX(-4px); }
          40%, 80% { transform: translateX(4px); }
        }
        @keyframes fadeIn {
          from { opacity: 0; transform: translateY(4px); }
          to { opacity: 1; transform: translateY(0); }
        }
        .animate-shake {
          animation: shake 0.4s ease-in-out;
        }
        .animate-fadeIn {
          animation: fadeIn 0.2s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
        .scrollbar-none::-webkit-scrollbar {
          display: none;
        }
        .scrollbar-none {
          -ms-overflow-style: none;
          scrollbar-width: none;
        }
      `}</style>
    </div>
  );
}
import ReactDOM from 'react-dom/client';
const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);

    </script>
</body>
</html>
